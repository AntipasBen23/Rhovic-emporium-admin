name: Admin CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: admin-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-and-build:
    name: Test and Build Admin
    runs-on: ubuntu-latest
    env:
      NEXT_PUBLIC_API_URL: ${{ vars.NEXT_PUBLIC_API_URL || 'https://rhovic-emporium-backend-production.up.railway.app' }}
      NEXT_PUBLIC_TURNSTILE_SITE_KEY: ${{ vars.NEXT_PUBLIC_TURNSTILE_SITE_KEY || '' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build admin
        run: npm run build

  deploy:
    name: Deploy Admin
    needs: test-and-build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Netlify deploy hook
        if: ${{ secrets.NETLIFY_BUILD_HOOK_URL != '' }}
        run: curl -fsSL -X POST "${{ secrets.NETLIFY_BUILD_HOOK_URL }}"

      - name: Skip deploy when no hook is configured
        if: ${{ secrets.NETLIFY_BUILD_HOOK_URL == '' }}
        run: echo "No Netlify build hook configured. CI passed; deploy step skipped."
